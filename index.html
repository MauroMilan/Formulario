<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

    <h1 id="mainTitle" class="text-center">Manipulación del DOM</h1>

    <form>
        <div class="formGroup">
            <label for="nameIpt">Nombre: </label>
            <input id="nameIpt" type="text">
        </div>


        <div class="formGroup">
            <label for="emailIpt">Email: </label>
            <input id="emailIpt" type="email">
        </div>

        <div class="formGroup">
            <label for="ageIpt">Edad: </label>
            <input id="ageIpt" type="number">
        </div>

        <button id="formBtn" type="submit" class="btn btn-primary"> Mostrar</button>
        <button id="resetBtn" type="reset" class="btn btn-primary"> Recargar</button>

    </form>

    <h2 id="greeting"></h2>

    <div id="feedbackAlert" class="alert alert-danger" role="alert" style="display:none ;">
        Necesitas ingresar tu nombre
    </div>

    <div id="feedbackEmail" class="alert alert-warning" role="alert" , style="display: none;">
        Ingresa un correo valido
    </div>

    <div id="feedbackAge" class="alert alert-dark" role="alert" , style="display: none;">
        Ingresa una edad valida
    </div>

    <script src="./javascript/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>





</body>

</html>
